<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>NEON DEFUSER // ELITE PROTOCOL</title>
  <style>
    :root {
      --bg: #060b1a;
      --card: #0f1629;
      --accent: #a855f7;
      --accent2: #06b6d4;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --success: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;
      --shadow: 0 20px 40px rgba(0,0,0,.6);
      --bronze: #cd7f32;
      --silver: #c0c0c0;
      --gold: #ffd700;
      --platinum: #e5e4e2;
      --emerald: #50c878;
      --diamond: #b9f2ff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Share Tech Mono', 'Courier New', monospace;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }

    body.theme-default {
      background: radial-gradient(ellipse at 20% 50%, rgba(168,85,247,.1) 0%, transparent 50%),
                  radial-gradient(ellipse at 80% 20%, rgba(6,182,212,.08) 0%, transparent 50%),
                  linear-gradient(180deg, #060b1a 0%, #0f1629 50%, #060b1a 100%);
    }
    body.theme-mono {
      background: linear-gradient(180deg, #0a0a0a 0%, #1a1a1a 50%, #0a0a0a 100%);
    }
    body.theme-ocean {
      background: radial-gradient(ellipse at 30% 30%, rgba(59,130,246,.08) 0%, transparent 50%),
                  linear-gradient(180deg, #0a0e1a 0%, #0f1a2d 50%, #0a0e1a 100%);
    }
    body.theme-matrix {
      background: radial-gradient(ellipse at 20% 50%, rgba(16,185,129,.08) 0%, transparent 50%),
                  linear-gradient(180deg, #0a0f0a 0%, #0d1a0d 50%, #0a0f0a 100%);
    }
    body.theme-lava {
      background: radial-gradient(ellipse at 50% 80%, rgba(239,68,68,.1) 0%, transparent 50%),
                  linear-gradient(180deg, #1a0a0a 0%, #2d0f0f 50%, #1a0a0a 100%);
    }
    body.theme-sunset {
      background: radial-gradient(ellipse at 50% 60%, rgba(245,158,11,.08) 0%, transparent 50%),
                  radial-gradient(ellipse at 20% 20%, rgba(168,85,247,.06) 0%, transparent 50%),
                  linear-gradient(180deg, #1a0f0a 0%, #2d1a0f 50%, #1a0f0a 100%);
    }

    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: repeating-linear-gradient(0deg, rgba(0,0,0,.1) 0px, rgba(0,0,0,.1) 1px, transparent 1px, transparent 2px);
      pointer-events: none;
      z-index: 999;
      opacity: .15;
    }

    .game {
      width: min(500px, 100%);
      background: rgba(15,22,41,.9);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(168,85,247,.15);
      border-radius: 24px;
      padding: 20px;
      box-shadow: var(--shadow), 0 0 40px rgba(168,85,247,.05);
      position: relative;
      z-index: 1;
    }

    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      flex-wrap: wrap;
      gap: 8px;
    }
    .title-group {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo {
      width: 44px; height: 44px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: grid; place-items: center;
      font-size: 1.4rem;
      box-shadow: 0 0 20px rgba(168,85,247,.3);
      animation: pulse-glow 2s ease-in-out infinite;
    }
    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 20px rgba(168,85,247,.3); }
      50% { box-shadow: 0 0 35px rgba(168,85,247,.6); }
    }
    h1 {
      font-size: 1.3rem;
      letter-spacing: 1.5px;
      background: linear-gradient(to right, var(--accent2), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-transform: uppercase;
    }
    .subtitle {
      font-size: .65rem;
      color: var(--muted);
      letter-spacing: 1px;
    }
    .mode-badge {
      background: rgba(168,85,247,.15);
      border: 1px solid rgba(168,85,247,.3);
      border-radius: 8px;
      padding: 4px 10px;
      font-size: .7rem;
      color: var(--accent2);
      text-transform: uppercase;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      margin: 12px 0;
    }
    .stat {
      background: rgba(255,255,255,.02);
      border: 1px solid rgba(255,255,255,.05);
      border-radius: 10px;
      padding: 8px;
      text-align: center;
    }
    .stat .label {
      color: var(--muted);
      font-size: .6rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .stat .value {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--accent2);
      margin-top: 2px;
    }

    .rank-progress {
      margin: 8px 0;
    }
    .rank-info {
      display: flex;
      justify-content: space-between;
      font-size: .65rem;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .rank-bar-container {
      width: 100%;
      height: 6px;
      background: rgba(255,255,255,.08);
      border-radius: 3px;
      overflow: hidden;
    }
    .rank-bar {
      height: 100%;
      border-radius: 3px;
      transition: width .4s ease;
    }
    .rank-bar.bronze { background: linear-gradient(90deg, #cd7f32, #e8a862); }
    .rank-bar.silver { background: linear-gradient(90deg, #a0a0a0, #d0d0d0); }
    .rank-bar.gold { background: linear-gradient(90deg, #d4a017, #ffd700); }
    .rank-bar.platinum { background: linear-gradient(90deg, #5f9ea0, #b0e0e6); }
    .rank-bar.emerald { background: linear-gradient(90deg, #2e8b57, #50c878); }
    .rank-bar.diamond { background: linear-gradient(90deg, #7ec8e3, #c5f6ff); }

    .bomb-container {
      position: relative;
      width: 180px; height: 180px;
      margin: 16px auto;
    }
    .bomb {
      width: 100%; height: 100%;
      border-radius: 50%;
      background: radial-gradient(circle at 40% 35%, #2d2b55, #1a1833 60%, #0f0d22);
      border: 2px solid rgba(255,255,255,.08);
      box-shadow: inset 0 8px 20px rgba(255,255,255,.03), 0 0 30px rgba(168,85,247,.15), 0 12px 24px rgba(0,0,0,.4);
      display: grid; place-items: center;
      position: relative;
      transition: all .3s;
    }
    .bomb.warning {
      box-shadow: inset 0 8px 20px rgba(255,255,255,.03), 0 0 35px rgba(239,68,68,.4), 0 12px 24px rgba(0,0,0,.4);
      animation: warning-pulse .6s ease-in-out infinite;
    }
    @keyframes warning-pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    .bomb.danger {
      box-shadow: inset 0 8px 20px rgba(255,255,255,.03), 0 0 50px rgba(239,68,68,.7), 0 12px 24px rgba(0,0,0,.4);
      animation: danger-shake .15s linear infinite;
    }
    @keyframes danger-shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-4px) rotate(-1deg); }
      75% { transform: translateX(4px) rotate(1deg); }
    }
    .bomb::before {
      content: "";
      position: absolute;
      top: -20px;
      width: 56px; height: 24px;
      border-radius: 12px 12px 5px 5px;
      background: linear-gradient(180deg, #6e7491, #484d66);
      box-shadow: 0 3px 10px rgba(0,0,0,.3);
    }

    .led-timer {
      font-size: 2.4rem;
      font-weight: 900;
      font-family: 'Share Tech Mono', monospace;
      background: linear-gradient(to bottom, #ff4444, #cc0000);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 20px rgba(255,0,0,.5), 0 0 40px rgba(255,0,0,.2);
      position: relative; z-index: 1;
    }
    .led-timer.safe {
      background: linear-gradient(to bottom, #10b981, #059669);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 20px rgba(16,185,129,.5), 0 0 40px rgba(16,185,129,.2);
    }

    .explosion {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 0; height: 0;
      background: radial-gradient(circle, rgba(255,100,0,.9), rgba(255,50,0,.6), transparent);
      border-radius: 50%;
      pointer-events: none;
      z-index: 1000;
      animation: explode .8s ease-out forwards;
    }
    @keyframes explode {
      0% { width: 0; height: 0; opacity: 1; }
      50% { width: 300px; height: 300px; opacity: .8; }
      100% { width: 600px; height: 600px; opacity: 0; }
    }
    .screen-shake {
      animation: screen-shake .5s ease-out;
    }
    @keyframes screen-shake {
      0%, 100% { transform: translate(0); }
      10% { transform: translate(-8px, 4px); }
      20% { transform: translate(8px, -4px); }
      30% { transform: translate(-6px, -2px); }
      40% { transform: translate(6px, 2px); }
      50% { transform: translate(-4px, 0); }
      60% { transform: translate(4px, 0); }
      70% { transform: translate(-2px, 0); }
      80% { transform: translate(2px, 0); }
      90% { transform: translate(-1px, 0); }
    }

    .wires {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .wire {
      position: relative;
      overflow: hidden;
      border: none;
      border-radius: 14px;
      padding: 12px 16px;
      font-size: .85rem;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
      transition: all .2s ease;
      box-shadow: 0 6px 12px rgba(0,0,0,.3);
      letter-spacing: 1px;
      text-transform: uppercase;
      font-family: 'Share Tech Mono', monospace;
    }
    .wire::before {
      content: "";
      position: absolute;
      top: 50%; left: 12px;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,.7);
      box-shadow: 0 0 8px rgba(255,255,255,.4);
      transform: translateY(-50%);
    }
    .wire::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,0));
      pointer-events: none;
    }
    .wire:active { transform: scale(.97); }

    .wire.red { background: linear-gradient(135deg, #ef4444, #991b1b); }
    .wire.blue { background: linear-gradient(135deg, #3b82f6, #1e40af); }
    .wire.green { background: linear-gradient(135deg, #10b981, #065f46); }
    .wire.yellow { background: linear-gradient(135deg, #f59e0b, #92400e); color: #1f2937; }

    .wire.boom-indicator {
      animation: subtle-flicker 3s ease-in-out infinite;
    }
    .wire.boom-indicator::before {
      animation: dot-pulse 3s ease-in-out infinite;
    }
    @keyframes subtle-flicker {
      0%, 90%, 100% { opacity: 1; }
      92% { opacity: 0.97; }
      94% { opacity: 1; }
      96% { opacity: 0.98; }
    }
    @keyframes dot-pulse {
      0%, 100% { box-shadow: 0 0 8px rgba(255,255,255,.4); }
      50% { box-shadow: 0 0 12px rgba(255,255,255,.5); }
    }

    .wire .spark {
      position: absolute;
      width: 3px; height: 3px;
      background: #fff;
      border-radius: 50%;
      pointer-events: none;
      animation: spark-fly .8s ease-out forwards;
    }
    @keyframes spark-fly {
      0% { transform: translate(0,0) scale(1); opacity: 1; }
      100% { transform: translate(var(--sx), var(--sy)) scale(0); opacity: 0; }
    }

    .wire.cutting {
      animation: cut-wire .4s ease forwards;
    }
    @keyframes cut-wire {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.03) rotate(3deg); opacity: .7; }
      100% { transform: scale(.9) rotate(-2deg); opacity: .3; text-decoration: line-through; filter: grayscale(.5); }
    }
    .wire.cut {
      opacity: .25;
      text-decoration: line-through;
      cursor: not-allowed;
      filter: grayscale(.7);
    }

    .footer {
      display: flex;
      gap: 8px;
      margin-top: 16px;
      flex-wrap: wrap;
    }
    .btn {
      flex: 1;
      min-width: 60px;
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 12px;
      padding: 10px 14px;
      font-size: .75rem;
      font-weight: 700;
      cursor: pointer;
      transition: all .2s ease;
      letter-spacing: 1px;
      text-transform: uppercase;
      font-family: 'Share Tech Mono', monospace;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active { transform: translateY(1px) scale(.97); }
    .btn-primary {
      color: #fff;
      background: linear-gradient(135deg, var(--accent), #7c3aed);
      border-color: rgba(168,85,247,.4);
    }
    .btn-secondary {
      color: var(--text);
      background: rgba(255,255,255,.04);
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.75);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 100;
      backdrop-filter: blur(4px);
    }
    .overlay.show { display: flex; }
    .modal {
      width: min(440px, 100%);
      max-height: 85vh;
      overflow-y: auto;
      background: rgba(15,22,41,.98);
      border: 1px solid rgba(168,85,247,.2);
      border-radius: 20px;
      padding: 20px;
      box-shadow: var(--shadow), 0 0 30px rgba(168,85,247,.1);
      text-align: center;
    }
    .modal h2 { font-size: 1.5rem; margin-bottom: 8px; letter-spacing: 1.5px; }
    .modal p { color: var(--muted); margin: 6px 0; font-size: .85rem; }
    .big {
      font-size: 2rem;
      font-weight: 900;
      margin: 12px 0;
      background: linear-gradient(to right, var(--accent2), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .shop-tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 12px;
      border-bottom: 1px solid rgba(255,255,255,.08);
      padding-bottom: 8px;
    }
    .shop-tab {
      flex: 1;
      padding: 8px;
      border: none;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-family: inherit;
      font-size: .7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      border-radius: 8px;
      transition: all .2s;
    }
    .shop-tab.active {
      background: rgba(168,85,247,.2);
      color: var(--accent2);
    }

    .shop-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin: 12px 0;
    }
    .shop-item {
      background: rgba(255,255,255,.02);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 12px;
      padding: 10px;
      text-align: center;
      font-size: .75rem;
    }
    .shop-item .item-icon { font-size: 1.8rem; margin-bottom: 4px; }
    .shop-item button {
      margin-top: 6px;
      padding: 6px 12px;
      border-radius: 6px;
      border: none;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      font-weight: 700;
      font-size: .7rem;
      width: 100%;
    }
    .shop-item button:disabled { opacity: .3; cursor: not-allowed; }
    .shop-item button.owned { background: var(--success); }

    .achievement-toast {
      position: fixed;
      top: 20px;
      right: 20px;
      background: rgba(15,22,41,.95);
      border: 1px solid var(--accent);
      border-radius: 12px;
      padding: 12px 16px;
      z-index: 200;
      color: #fff;
      font-family: 'Share Tech Mono', monospace;
      font-size: .8rem;
      animation: slide-in .3s ease-out, slide-out .3s ease-in 3s forwards;
      box-shadow: 0 0 20px rgba(168,85,247,.3);
      max-width: 250px;
    }
    @keyframes slide-in {
      from { transform: translateX(120%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slide-out {
      from { transform: translateX(0); opacity: 1; }
      to { transform: translateX(120%); opacity: 0; }
    }

    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,.05);
    }
    .setting-row label { font-size: .8rem; }
    .setting-row select, .setting-row input[type="range"] {
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 6px;
      color: #fff;
      padding: 4px 8px;
      font-family: inherit;
    }

    .confetti {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 101;
    }
    .piece {
      position: absolute;
      width: 8px; height: 10px;
      border-radius: 2px;
      animation: fall linear forwards;
    }
    @keyframes fall {
      to { transform: translateY(110vh) rotate(720deg) scale(0); opacity: 0; }
    }

    .achievements-list {
      text-align: left;
      max-height: 300px;
      overflow-y: auto;
    }
    .achievement-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px;
      border-bottom: 1px solid rgba(255,255,255,.05);
      font-size: .75rem;
    }
    .achievement-row.unlocked { color: var(--success); }
    .achievement-row.locked { color: var(--muted); opacity: .6; }
    .achievement-row .ach-icon { font-size: 1.4rem; }

    @media (max-width: 420px) {
      .game { padding: 12px; border-radius: 18px; }
      .bomb-container { width: 150px; height: 150px; }
      .led-timer { font-size: 2rem; }
      .stats { grid-template-columns: repeat(3, 1fr); gap: 4px; }
      .btn { padding: 8px 10px; font-size: .7rem; }
      .achievement-toast { right: 10px; left: 10px; max-width: none; }
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
</head>
<body class="theme-default">
  <div class="game" id="gameContainer">
    <div class="top">
      <div class="title-group">
        <div class="logo">&#9760;&#65039;</div>
        <div>
          <h1>NEON DEFUSER</h1>
          <div class="subtitle">ELITE PROTOCOL v3.1</div>
        </div>
      </div>
      <div class="mode-badge" id="modeBadge">CASUAL</div>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="label">SCORE</div>
        <div class="value" id="score">0</div>
      </div>
      <div class="stat">
        <div class="label">COINS</div>
        <div class="value" id="coins">0</div>
      </div>
      <div class="stat">
        <div class="label">STREAK</div>
        <div class="value" id="streak">0&#128293;</div>
      </div>
    </div>

    <div class="rank-progress" id="rankProgress">
      <div class="rank-info">
        <span id="rankName">BRONZE III</span>
        <span id="rankPoints">0/100 RP</span>
      </div>
      <div class="rank-bar-container">
        <div class="rank-bar bronze" id="rankBar" style="width: 0%"></div>
      </div>
    </div>

    <div class="bomb-container">
      <div class="bomb" id="bomb">
        <div class="led-timer" id="timer">30</div>
      </div>
    </div>

    <div class="status" id="status" style="text-align:center;min-height:22px;font-size:.75rem;color:var(--muted);margin:8px 0;"></div>

    <div class="wires" id="wires"></div>

    <div class="footer">
      <button class="btn btn-secondary" id="shopBtn">&#128761; SHOP</button>
      <button class="btn btn-secondary" id="settingsBtn">&#9881;&#65039;</button>
      <button class="btn btn-secondary" id="achievementsBtn">&#127942;</button>
      <button class="btn btn-secondary" id="modeBtn">&#127918;</button>
    </div>
  </div>

  <div class="overlay" id="overlay">
    <div class="modal">
      <h2 id="resultTitle">STATUS</h2>
      <p id="resultText">Operation complete.</p>
      <div class="big" id="resultScore">+0</div>
      <p style="font-size:.7rem;color:var(--muted)" id="resultDetail"></p>
      <button class="btn btn-primary" id="playAgainBtn" style="width:100%;margin-top:8px;">CONTINUE</button>
    </div>
  </div>

  <div class="overlay" id="shopOverlay">
    <div class="modal">
      <h2>&#128761; SHOP</h2>
      <p>Coins: <span id="shopCoins">0</span> &#129689;</p>
      <div class="shop-tabs">
        <button class="shop-tab active" data-tab="powerups">POWERUPS</button>
        <button class="shop-tab" data-tab="themes">THEMES</button>
        <button class="shop-tab" data-tab="skins">SKINS</button>
      </div>
      <div class="shop-grid" id="shopGrid"></div>
      <button class="btn btn-secondary" id="closeShopBtn" style="width:100%">CLOSE</button>
    </div>
  </div>

  <div class="overlay" id="settingsOverlay">
    <div class="modal">
      <h2>&#9881;&#65039; SETTINGS</h2>
      <div class="setting-row">
        <label>SFX Volume</label>
        <input type="range" id="sfxVolume" min="0" max="100" value="30">
      </div>
      <div class="setting-row">
        <label>Haptics</label>
        <select id="hapticsSelect">
          <option value="on">On</option>
          <option value="off">Off</option>
        </select>
      </div>
      <div class="setting-row">
        <label>Confetti</label>
        <select id="confettiSelect">
          <option value="on">On</option>
          <option value="off">Off</option>
        </select>
      </div>
      <button class="btn btn-primary" id="closeSettingsBtn" style="width:100%;margin-top:12px;">SAVE &amp; CLOSE</button>
    </div>
  </div>

  <div class="overlay" id="achievementsOverlay">
    <div class="modal">
      <h2>&#127942; ACHIEVEMENTS</h2>
      <div class="achievements-list" id="achievementsList"></div>
      <button class="btn btn-secondary" id="closeAchievementsBtn" style="width:100%;margin-top:12px;">CLOSE</button>
    </div>
  </div>

  <div class="overlay" id="modeOverlay">
    <div class="modal">
      <h2>&#127918; GAME MODE</h2>
      <button class="btn btn-primary" data-mode="casual" style="width:100%;margin:6px 0;">CASUAL</button>
      <button class="btn btn-secondary" data-mode="ranked" style="width:100%;margin:6px 0;">RANKED</button>
      <button class="btn btn-secondary" id="closeModeBtn" style="width:100%;margin-top:8px;">CANCEL</button>
    </div>
  </div>

  <div class="confetti" id="confetti"></div>

  <script>
    const wireColors = ['red','blue','green','yellow'];
    let score = 0;
    let coins = Number(localStorage.getItem('defuserCoins') || 0);
    let highScore = Number(localStorage.getItem('defuserHighScore') || 0);
    let streak = 0;
    let bestStreak = Number(localStorage.getItem('defuserBestStreak') || 0);
    let boomWire = '';
    let safeWires = [];
    let timeLeft = 30;
    let timer = null;
    let gameOver = false;
    let gameMode = 'casual';
    let rankedTier = localStorage.getItem('defuserRankedTier') || 'bronze';
    let rankedDivision = Number(localStorage.getItem('defuserRankedDivision') || 3);
    let rankedPoints = Number(localStorage.getItem('defuserRankedPoints') || 0);
    let rankedGames = Number(localStorage.getItem('defuserRankedGames') || 0);
    let roundActive = false;
    
    let sfxVolume = Number(localStorage.getItem('defuserSfxVolume') || 30);
    let hapticsOn = localStorage.getItem('defuserHaptics') !== 'off';
    let confettiOn = localStorage.getItem('defuserConfetti') !== 'off';
    let theme = localStorage.getItem('defuserTheme') || 'default';
    
    let inventory = JSON.parse(localStorage.getItem('defuserInventory') || '{"themes":[],"skins":[]}');
    let slowMoCharges = Number(localStorage.getItem('defuserSlowMo') || 0);
    let shieldActive = false;
    let currentShopTab = 'powerups';
    
    let achievements = JSON.parse(localStorage.getItem('defuserAchievements') || '{}');
    let totalDefusals = Number(localStorage.getItem('defuserTotalDefusals') || 0);
    let totalWiresCut = Number(localStorage.getItem('defuserTotalWiresCut') || 0);

    const achievementDefs = [
      { id: 'first_win', name: 'First Defusal', desc: 'Defuse your first bomb', icon: '🎯', check: () => totalDefusals >= 1 },
      { id: 'streak_3', name: 'Hot Streak', desc: 'Get a 3-win streak', icon: '🔥', check: () => bestStreak >= 3 },
      { id: 'streak_5', name: 'On Fire', desc: 'Get a 5-win streak', icon: '💥', check: () => bestStreak >= 5 },
      { id: 'streak_10', name: 'Untouchable', desc: 'Get a 10-win streak', icon: '👑', check: () => bestStreak >= 10 },
      { id: 'wires_50', name: 'Wire Cutter', desc: 'Cut 50 safe wires', icon: '✂️', check: () => totalWiresCut >= 50 },
      { id: 'wires_200', name: 'Electrician', desc: 'Cut 200 safe wires', icon: '⚡', check: () => totalWiresCut >= 200 },
      { id: 'defusals_25', name: 'Bomb Squad', desc: 'Defuse 25 bombs', icon: '💣', check: () => totalDefusals >= 25 },
      { id: 'defusals_100', name: 'Master Defuser', desc: 'Defuse 100 bombs', icon: '🏅', check: () => totalDefusals >= 100 },
      { id: 'ranked_bronze', name: 'Competitor', desc: 'Reach Bronze in ranked', icon: '🥉', check: () => rankedTier !== 'bronze' || rankedDivision < 3 },
      { id: 'ranked_gold', name: 'Gold Standard', desc: 'Reach Gold in ranked', icon: '🥇', check: () => ['gold','platinum','emerald','diamond'].includes(rankedTier) },
      { id: 'ranked_diamond', name: 'Diamond Elite', desc: 'Reach Diamond in ranked', icon: '💎', check: () => rankedTier === 'diamond' },
      { id: 'fast_win', name: 'Speed Demon', desc: 'Defuse with 20+ seconds left', icon: '⚡', check: () => false },
    ];

    const $ = id => document.getElementById(id);
    const scoreEl = $('score'), coinsEl = $('coins'), streakEl = $('streak');
    const timerEl = $('timer'), statusEl = $('status'), wiresEl = $('wires');
    const bombEl = $('bomb'), gameContainer = $('gameContainer');
    const overlay = $('overlay'), resultTitle = $('resultTitle'), resultText = $('resultText');
    const resultScore = $('resultScore'), resultDetail = $('resultDetail');
    const confettiEl = $('confetti'), rankName = $('rankName'), rankPoints = $('rankPoints');
    const rankBar = $('rankBar'), modeBadge = $('modeBadge');

    function beep(freq, dur, type='sine', volMult=1) {
      const vol = (sfxVolume / 100) * 0.06 * volMult;
      if (vol <= 0) return;
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator(), gain = ctx.createGain();
        osc.type = type; osc.frequency.value = freq; gain.gain.value = vol;
        osc.connect(gain); gain.connect(ctx.destination);
        osc.start(); osc.stop(ctx.currentTime + dur/1000);
        osc.onended = () => ctx.close();
      } catch(e) {}
    }
    function sfxSuccess() { beep(523,100,'triangle'); setTimeout(()=>beep(659,100,'triangle'),80); setTimeout(()=>beep(784,180,'triangle'),160); }
    function sfxFail() { beep(70,700,'sawtooth',2); setTimeout(()=>beep(50,400,'square',1.5),150); }
    function sfxClick() { beep(800,30,'sine',0.5); }
    function haptic(pattern) {
      if (!hapticsOn || !navigator.vibrate) return;
      const patterns = { light: 20, success: [30,40,30], fail: [150,80,150], boom: [200,100,200,100,400] };
      navigator.vibrate(patterns[pattern] || 20);
    }

    function triggerExplosion() {
      const exp = document.createElement('div');
      exp.className = 'explosion';
      document.body.appendChild(exp);
      gameContainer.classList.add('screen-shake');
      haptic('boom');
      setTimeout(() => { exp.remove(); gameContainer.classList.remove('screen-shake'); }, 900);
    }

    function applyTheme() {
      document.body.className = 'theme-' + theme;
      localStorage.setItem('defuserTheme', theme);
    }

    const tierOrder = ['bronze','silver','gold','platinum','emerald','diamond'];
    const tierColors = { bronze:'#cd7f32', silver:'#c0c0c0', gold:'#ffd700', platinum:'#5f9ea0', emerald:'#50c878', diamond:'#b9f2ff' };
    const divisionNames = { 3:'III', 2:'II', 1:'I' };
    
    function getRankedTierIndex() { return tierOrder.indexOf(rankedTier); }
    
    function updateRankedDisplay() {
      if (gameMode !== 'ranked') {
        $('rankProgress').style.display = 'none';
        modeBadge.textContent = 'CASUAL';
        modeBadge.style.borderColor = 'rgba(168,85,247,.3)';
        modeBadge.style.color = 'var(--accent2)';
        return;
      }
      $('rankProgress').style.display = 'block';
      rankName.textContent = rankedTier.toUpperCase() + ' ' + divisionNames[rankedDivision];
      rankName.style.color = tierColors[rankedTier] || '#fff';
      rankPoints.textContent = rankedPoints + '/100 RP';
      rankBar.style.width = Math.min(100, rankedPoints) + '%';
      rankBar.className = 'rank-bar ' + rankedTier;
      modeBadge.textContent = 'RANKED';
      modeBadge.style.borderColor = tierColors[rankedTier];
      modeBadge.style.color = tierColors[rankedTier];
    }
    
    function addRP(amount) {
      if (gameMode !== 'ranked') return;
      rankedPoints += amount;
      rankedGames++;
      localStorage.setItem('defuserRankedGames', rankedGames);
      while (rankedPoints >= 100 && getRankedTierIndex() < tierOrder.length - 1) {
        rankedPoints -= 100;
        if (rankedDivision <= 1) {
          const nextIdx = getRankedTierIndex() + 1;
          if (nextIdx < tierOrder.length) { rankedTier = tierOrder[nextIdx]; rankedDivision = 3; }
        } else { rankedDivision--; }
      }
      if (getRankedTierIndex() === tierOrder.length - 1 && rankedDivision < 1) rankedDivision = 1;
      localStorage.setItem('defuserRankedTier', rankedTier);
      localStorage.setItem('defuserRankedDivision', rankedDivision);
      localStorage.setItem('defuserRankedPoints', rankedPoints);
      updateRankedDisplay();
    }
    
    function loseRP(amount) {
      if (gameMode !== 'ranked') return;
      rankedPoints = Math.max(0, rankedPoints - amount);
      rankedGames++;
      localStorage.setItem('defuserRankedGames', rankedGames);
      localStorage.setItem('defuserRankedPoints', rankedPoints);
      updateRankedDisplay();
    }

    function addBoomWireIndicators() {
      document.querySelectorAll('.wire.boom-indicator').forEach(w => w.classList.remove('boom-indicator'));
      const boomBtn = document.querySelector('[data-color="' + boomWire + '"]');
      if (boomBtn && !boomBtn.classList.contains('cut') && !gameOver) {
        boomBtn.classList.add('boom-indicator');
      }
    }

    function spawnSpark(btn) {
      if (!btn || btn.classList.contains('cut')) return;
      const spark = document.createElement('div');
      spark.className = 'spark';
      spark.style.setProperty('--sx', (Math.random()*30-15) + 'px');
      spark.style.setProperty('--sy', (Math.random()*-20-10) + 'px');
      spark.style.left = (30 + Math.random() * 60) + '%';
      spark.style.top = (40 + Math.random() * 40) + '%';
      btn.appendChild(spark);
      setTimeout(() => spark.remove(), 800);
    }

    let sparkInterval = null;
    function startSparkSystem() {
      clearInterval(sparkInterval);
      sparkInterval = setInterval(() => {
        if (gameOver || roundActive === false) { clearInterval(sparkInterval); return; }
        const boomBtn = document.querySelector('[data-color="' + boomWire + '"]');
        if (boomBtn && !boomBtn.classList.contains('cut') && Math.random() < 0.4) {
          spawnSpark(boomBtn);
        }
      }, 4000);
    }

    function checkAchievements() {
      achievementDefs.forEach(ach => {
        if (achievements[ach.id]) return;
        if (ach.check()) {
          achievements[ach.id] = Date.now();
          localStorage.setItem('defuserAchievements', JSON.stringify(achievements));
          showAchievementToast(ach);
        }
      });
    }

    function checkFastWin() {
      if (!achievements['fast_win'] && timeLeft >= 20) {
        achievements['fast_win'] = Date.now();
        localStorage.setItem('defuserAchievements', JSON.stringify(achievements));
        const ach = achievementDefs.find(a => a.id === 'fast_win');
        showAchievementToast(ach);
      }
    }

    function showAchievementToast(ach) {
      const toast = document.createElement('div');
      toast.className = 'achievement-toast';
      toast.innerHTML = '<strong>🏆 Achievement!</strong><br>' + ach.icon + ' ' + ach.name + '<br><small>' + ach.desc + '</small>';
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3300);
    }

    function renderAchievements() {
      const list = $('achievementsList');
      list.innerHTML = achievementDefs.map(ach => {
        const unlocked = !!achievements[ach.id];
        return '<div class="achievement-row ' + (unlocked ? 'unlocked' : 'locked') + '"><span class="ach-icon">' + ach.icon + '</span><div><strong>' + ach.name + '</strong><div style="font-size:.65rem">' + ach.desc + '</div></div><span style="margin-left:auto">' + (unlocked ? '✅' : '🔒') + '</span></div>';
      }).join('');
    }

    function shuffle(arr) { return arr.sort(() => Math.random() - 0.5); }
    
    function renderWires() {
      wiresEl.innerHTML = '';
      wireColors.forEach(color => {
        const btn = document.createElement('button');
        btn.className = 'wire ' + color;
        btn.textContent = color.toUpperCase();
        btn.dataset.color = color;
        btn.addEventListener('click', () => cutWire(color, btn));
        wiresEl.appendChild(btn);
      });
    }

    function startGame() {
      clearInterval(timer);
      clearInterval(sparkInterval);
      gameOver = false;
      roundActive = true;
      
      if (gameMode === 'ranked') {
        const tierIdx = getRankedTierIndex();
        timeLeft = Math.max(10, 30 - tierIdx * 3 - (3 - rankedDivision));
      } else {
        timeLeft = 30;
      }
      
      timerEl.textContent = timeLeft;
      timerEl.className = 'led-timer';
      bombEl.classList.remove('warning', 'danger');
      statusEl.textContent = '[ CIRCUIT LIVE - OBSERVE CAREFULLY ]';
      statusEl.style.color = 'var(--muted)';
      
      const shuffled = shuffle([...wireColors]);
      boomWire = shuffled[0];
      safeWires = shuffled.slice(1);
      
      renderWires();
      
      setTimeout(() => {
        addBoomWireIndicators();
        startSparkSystem();
      }, 1000);
      
      shieldActive = false;
      
      timer = setInterval(() => {
        timeLeft--;
        timerEl.textContent = timeLeft;
        
        if (timeLeft <= 8 && timeLeft > 4) {
          bombEl.classList.add('warning'); bombEl.classList.remove('danger');
          beep(1000, 40, 'square', 0.6);
        } else if (timeLeft <= 4) {
          bombEl.classList.add('danger'); bombEl.classList.remove('warning');
          beep(1300, 30, 'square', 0.8);
        } else {
          bombEl.classList.remove('warning', 'danger');
          timerEl.className = 'led-timer';
        }
        
        if (timeLeft <= 0) {
          endGame(false, 'TIME EXPIRED - DETONATION');
        }
      }, 1000);
    }

    function cutWire(color, btn) {
      if (gameOver || btn.classList.contains('cut') || !roundActive) return;
      
      sfxClick();
      
      if (slowMoCharges > 0 && color !== boomWire && safeWires.length > 1) {
        slowMoCharges--;
        localStorage.setItem('defuserSlowMo', slowMoCharges);
        statusEl.textContent = '[ SLOW-MO ACTIVATED ]';
        statusEl.style.color = 'var(--accent2)';
        beep(440, 200, 'sine', 0.5);
        clearInterval(timer);
        timer = setInterval(() => {
          timeLeft--;
          timerEl.textContent = timeLeft;
          if (timeLeft <= 0) endGame(false, 'TIME EXPIRED');
        }, 2000);
        return;
      }
      
      btn.classList.add('cutting');
      haptic('light');
      
      setTimeout(() => {
        if (color === boomWire) {
          btn.classList.add('cut');
          triggerExplosion();
          sfxFail();
          
          if (gameMode === 'ranked') {
            loseRP(20 + getRankedTierIndex() * 5);
            streak = 0;
            streakEl.textContent = '0🔥';
          } else {
            score = 0;
            scoreEl.textContent = '0';
            streak = 0;
            streakEl.textContent = '0🔥';
          }
          
          clearInterval(sparkInterval);
          endGame(false, 'BOOM! The ' + color.toUpperCase() + ' wire was the trigger.');
          return;
        }
        
        btn.classList.add('cut');
        safeWires = safeWires.filter(w => w !== color);
        totalWiresCut++;
        localStorage.setItem('defuserTotalWiresCut', totalWiresCut);
        beep(660, 80, 'triangle', 0.6);
        haptic('success');
        statusEl.textContent = '[ SAFE! ' + safeWires.length + ' WIRE' + (safeWires.length!==1?'S':'') + ' LEFT ]';
        statusEl.style.color = 'var(--success)';
        
        addBoomWireIndicators();
        
        if (safeWires.length === 0) {
          clearInterval(sparkInterval);
          const roundScore = Math.max(30, timeLeft * 8);
          score += roundScore;
          scoreEl.textContent = score;
          streak++;
          streakEl.textContent = streak + '🔥';
          if (streak > bestStreak) {
            bestStreak = streak;
            localStorage.setItem('defuserBestStreak', bestStreak);
          }
          
          totalDefusals++;
          localStorage.setItem('defuserTotalDefusals', totalDefusals);
          
          const coinReward = Math.floor(roundScore / 8) + streak * 2;
          coins += coinReward;
          coinsEl.textContent = coins;
          localStorage.setItem('defuserCoins', coins);
          
          if (score > highScore) {
            highScore = score;
            localStorage.setItem('defuserHighScore', highScore);
          }
          
          if (gameMode === 'ranked') {
            addRP(15 + streak * 2 + getRankedTierIndex() * 3);
          }
          
          checkFastWin();
          checkAchievements();
          endGame(true, 'ALL SAFE WIRES CUT - BOMB DEFUSED');
        }
      }, 350);
    }

    function endGame(win, reason) {
      clearInterval(timer);
      clearInterval(sparkInterval);
      gameOver = true;
      roundActive = false;
      overlay.classList.add('show');
      
      if (win) {
        resultTitle.textContent = '✅ BOMB DEFUSED';
        resultTitle.style.color = 'var(--success)';
        resultText.textContent = reason;
        resultScore.textContent = '+' + Math.max(30, timeLeft * 8) + ' PTS | ' + streak + '🔥 STREAK';
        resultDetail.textContent = gameMode === 'ranked' ? 
          'Ranked: ' + rankedTier.toUpperCase() + ' ' + divisionNames[rankedDivision] + ' | +RP' : 
          'High Score: ' + highScore;
        if (confettiOn) launchConfetti();
        sfxSuccess();
      } else {
        resultTitle.textContent = '💥 DETONATION';
        resultTitle.style.color = 'var(--danger)';
        resultText.textContent = reason;
        resultScore.textContent = gameMode === 'ranked' ? '-RP' : 'SCORE RESET';
        resultDetail.textContent = gameMode === 'ranked' ? 
          'Current: ' + rankedTier.toUpperCase() + ' ' + divisionNames[rankedDivision] + ' | ' + rankedPoints + ' RP' : 
          'Score reset to 0. Try again!';
        haptic('fail');
      }
    }

    function launchConfetti() {
      confettiEl.innerHTML = '';
      const colors = ['#a855f7','#06b6d4','#10b981','#f59e0b','#ef4444','#3b82f6','#ffd700'];
      for (let i = 0; i < 80; i++) {
        const piece = document.createElement('div');
        piece.className = 'piece';
        piece.style.left = Math.random() * 100 + 'vw';
        piece.style.top = (-10 - Math.random() * 15) + 'vh';
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.transform = 'rotate(' + Math.random()*360 + 'deg)';
        piece.style.animationDuration = (2 + Math.random() * 3) + 's';
        confettiEl.appendChild(piece);
      }
      setTimeout(() => confettiEl.innerHTML = '', 5500);
    }

    const shopItems = {
      powerups: [
        { id: 'slowmo3', name: 'Slow-Mo x3', icon: '⏱️', cost: 80, desc: 'Auto-activates on safe cuts', action: () => { slowMoCharges += 3; localStorage.setItem('defuserSlowMo', slowMoCharges); } },
        { id: 'shield', name: 'Shield', icon: '🛡️', cost: 150, desc: 'Block one explosion', action: () => { shieldActive = true; } },
      ],
      themes: [
        { id: 'theme_default', name: 'Default', icon: '🌌', cost: 0, desc: 'Classic cyberpunk', owned: true, action: () => { theme = 'default'; applyTheme(); } },
        { id: 'theme_mono', name: 'Monochrome', icon: '⬛', cost: 200, desc: 'Black & white stealth', action: () => { theme = 'mono'; applyTheme(); inventory.themes.push('theme_mono'); } },
        { id: 'theme_ocean', name: 'Ocean Blue', icon: '🌊', cost: 300, desc: 'Deep blue gradient', action: () => { theme = 'ocean'; applyTheme(); inventory.themes.push('theme_ocean'); } },
        { id: 'theme_matrix', name: 'Matrix', icon: '🟢', cost: 400, desc: 'Green hacker vibe', action: () => { theme = 'matrix'; applyTheme(); inventory.themes.push('theme_matrix'); } },
        { id: 'theme_lava', name: 'Lava', icon: '🌋', cost: 400, desc: 'Volcanic heat', action: () => { theme = 'lava'; applyTheme(); inventory.themes.push('theme_lava'); } },
        { id: 'theme_sunset', name: 'Sunset', icon: '🌅', cost: 400, desc: 'Warm sunset glow', action: () => { theme = 'sunset'; applyTheme(); inventory.themes.push('theme_sunset'); } },
      ],
      skins: [
        { id: 'skin_default', name: 'Default', icon: '💣', cost: 0, desc: 'Standard bomb', owned: true, action: () => {} },
      ]
    };

    function renderShop() {
      const grid = $('shopGrid');
      const items = shopItems[currentShopTab] || [];
      grid.innerHTML = '';
      
      items.forEach(item => {
        let owned = item.owned || false;
        if (currentShopTab === 'themes') owned = inventory.themes.includes(item.id) || item.id === 'theme_default';
        if (currentShopTab === 'skins') owned = inventory.skins.includes(item.id) || item.id === 'skin_default';
        
        const div = document.createElement('div');
        div.className = 'shop-item';
        div.innerHTML = '<div class="item-icon">' + item.icon + '</div><strong>' + item.name + '</strong><p style="font-size:.6rem;color:var(--muted)">' + item.desc + '</p><button ' + (owned ? 'class="owned" disabled' : '') + ' ' + (!owned && coins < item.cost ? 'disabled' : '') + ' onclick="purchaseShopItem(\'' + item.id + '\')">' + (owned ? 'OWNED' : item.cost === 0 ? 'FREE' : item.cost + '🪙') + '</button>';
        grid.appendChild(div);
      });
      $('shopCoins').textContent = coins;
    }
    
    function purchaseShopItem(id) {
      let item = null;
      let category = '';
      for (const [cat, items] of Object.entries(shopItems)) {
        const found = items.find(i => i.id === id);
        if (found) { item = found; category = cat; break; }
      }
      if (!item || coins < item.cost) return;
      
      coins -= item.cost;
      coinsEl.textContent = coins;
      localStorage.setItem('defuserCoins', coins);
      item.action();
      
      if (category === 'themes' && !inventory.themes.includes(id)) inventory.themes.push(id);
      if (category === 'skins' && !inventory.skins.includes(id)) inventory.skins.push(id);
      localStorage.setItem('defuserInventory', JSON.stringify(inventory));
      renderShop();
      sfxClick();
    }

    $('playAgainBtn').addEventListener('click', () => { overlay.classList.remove('show'); startGame(); });
    
    $('shopBtn').addEventListener('click', () => { 
      currentShopTab = 'powerups';
      document.querySelectorAll('.shop-tab').forEach(t => t.classList.remove('active'));
      document.querySelector('[data-tab="powerups"]').classList.add('active');
      renderShop(); 
      $('shopOverlay').classList.add('show'); 
    });
    $('closeShopBtn').addEventListener('click', () => $('shopOverlay').classList.remove('show'));
    
    document.querySelectorAll('.shop-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.shop-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentShopTab = tab.dataset.tab;
        renderShop();
      });
    });
    
    $('settingsBtn').addEventListener('click', () => {
      $('sfxVolume').value = sfxVolume;
      $('hapticsSelect').value = hapticsOn ? 'on' : 'off';
      $('confettiSelect').value = confettiOn ? 'on' : 'off';
      $('settingsOverlay').classList.add('show');
    });
    $('closeSettingsBtn').addEventListener('click', () => {
      sfxVolume = Number($('sfxVolume').value);
      hapticsOn = $('hapticsSelect').value === 'on';
      confettiOn = $('confettiSelect').value === 'on';
      localStorage.setItem('defuserSfxVolume', sfxVolume);
      localStorage.setItem('defuserHaptics', hapticsOn ? 'on' : 'off');
      localStorage.setItem('defuserConfetti', confettiOn ? 'on' : 'off');
      $('settingsOverlay').classList.remove('show');
    });
    
    $('achievementsBtn').addEventListener('click', () => {
      renderAchievements();
      $('achievementsOverlay').classList.add('show');
    });
    $('closeAchievementsBtn').addEventListener('click', () => $('achievementsOverlay').classList.remove('show'));
    
    $('modeBtn').addEventListener('click', () => $('modeOverlay').classList.add('show'));
    $('closeModeBtn').addEventListener('click', () => $('modeOverlay').classList.remove('show'));
    
    document.querySelectorAll('[data-mode]').forEach(btn => {
      btn.addEventListener('click', (e) => {
        gameMode = e.target.dataset.mode;
        if (gameMode === 'casual') { score = 0; scoreEl.textContent = '0'; }
        updateRankedDisplay();
        $('modeOverlay').classList.remove('show');
        overlay.classList.remove('show');
        startGame();
      });
    });

    function init() {
      coinsEl.textContent = coins;
      streakEl.textContent = streak + '🔥';
      applyTheme();
      updateRankedDisplay();
      if (inventory.themes.length === 0) inventory.themes = ['theme_default'];
      startGame();
    }
    init();
  </script>
</body>
</html>
